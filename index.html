<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Expense Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e9a;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --green: #1D9E75; --green-bg: #E1F5EE; --green-dark: #0F6E56;
    --red: #D85A30; --red-bg: #FAECE7; --red-dark: #993C1D;
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #a0a09a; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --green: #5DCAA5; --green-bg: #04342C; --green-dark: #9FE1CB;
      --red: #F0997B; --red-bg: #4A1B0C; --red-dark: #F5C4B3;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-full { grid-column: 1 / -1; }
  .metric { background: var(--bg); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 600; }
  .green { color: var(--green); }
  .red { color: var(--red); }

  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.15); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .add-btn {
    width: 100%; padding: 13px; font-size: 15px; font-weight: 600;
    background: var(--text); color: var(--bg); border: none;
    border-radius: var(--radius); cursor: pointer; margin-top: 4px;
  }
  .add-btn:active { opacity: 0.8; transform: scale(0.99); }

  .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab { flex: 1; padding: 8px 4px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text2); text-align: center; }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .txn-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .txn { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .txn-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .txn-icon.inc { background: var(--green-bg); color: var(--green-dark); }
  .txn-icon.exp { background: var(--red-bg); color: var(--red-dark); }
  .txn-info { flex: 1; min-width: 0; }
  .txn-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .txn-right { text-align: right; flex-shrink: 0; }
  .txn-amount { font-size: 14px; font-weight: 600; }
  .txn-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 6px; font-size: 18px; flex-shrink: 0; line-height: 1; }
  .del-btn:active { color: var(--red); }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text2); font-size: 14px; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); margin-bottom: 16px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  .chart-wrap { margin-bottom: 16px; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-val { font-size: 12px; color: var(--text); min-width: 60px; text-align: right; flex-shrink: 0; }

  .note { font-size: 12px; color: var(--text3); text-align: center; padding: 8px 0 24px; }

  select option { background: var(--bg); color: var(--text); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<header>
  <h1>💰 Expense Tracker</h1>
  <p id="month-label">June 2026</p>
</header>

<div class="container">

  <div class="metrics" id="metrics"></div>

  <div class="card">
    <p class="card-title">Add transaction</p>
    <div class="field">
      <label>Description</label>
      <input type="text" id="desc" placeholder="e.g. Groceries, Salary…" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0" min="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="cat">
        <optgroup label="── Expenses ──">
          <option>Food</option>
          <option>Transport</option>
          <option>Housing</option>
          <option>Health</option>
          <option>Entertainment</option>
          <option>Shopping</option>
          <option>Education</option>
          <option>Other</option>
        </optgroup>
        <optgroup label="── Income ──">
          <option>Salary</option>
          <option>Freelance</option>
          <option>Investment</option>
          <option>Gift</option>
        </optgroup>
      </select>
    </div>
    <button class="add-btn" onclick="addTxn()">+ Add Transaction</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">All</button>
    <button class="tab" onclick="setTab('expense',this)">Expenses</button>
    <button class="tab" onclick="setTab('income',this)">Income</button>
  </div>

  <div id="txnList"></div>

  <div class="card chart-wrap">
    <p class="card-title">Spending by category</p>
    <div class="bar-chart" id="barChart"></div>
  </div>

  <p class="note">Data is saved on this device. Works offline.</p>
</div>

<script>
const INCOME_CATS = ['Salary','Freelance','Investment','Gift'];
const CAT_COLORS = {
  Food:'#E24B4A', Transport:'#BA7517', Housing:'#185FA5', Health:'#1D9E75',
  Entertainment:'#534AB7', Shopping:'#D4537E', Education:'#0F6E56', Other:'#888780',
  Salary:'#1D9E75', Freelance:'#0F6E56', Investment:'#085041', Gift:'#5DCAA5'
};

let txns = JSON.parse(localStorage.getItem('et_txns') || 'null') || [
  {id:1, desc:'Monthly salary', amount:45000, cat:'Salary', date:'2026-06-01'},
  {id:2, desc:'Apartment rent', amount:12000, cat:'Housing', date:'2026-06-02'},
  {id:3, desc:'Groceries', amount:2800, cat:'Food', date:'2026-06-03'},
  {id:4, desc:'Metro pass', amount:600, cat:'Transport', date:'2026-06-04'},
  {id:5, desc:'Freelance project', amount:8000, cat:'Freelance', date:'2026-06-05'},
  {id:6, desc:'Restaurant dinner', amount:1200, cat:'Food', date:'2026-06-07'},
  {id:7, desc:'Doctor visit', amount:500, cat:'Health', date:'2026-06-08'},
  {id:8, desc:'Movie tickets', amount:400, cat:'Entertainment', date:'2026-06-09'},
];
let nextId = Math.max(...txns.map(t=>t.id), 0) + 1;
let activeTab = 'all';

function save(){ localStorage.setItem('et_txns', JSON.stringify(txns)); }
function isIncome(cat){ return INCOME_CATS.includes(cat); }
function fmt(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }
function today(){ return new Date().toISOString().slice(0,10); }

document.getElementById('date').value = today();

document.getElementById('month-label').textContent = new Date().toLocaleDateString('en-IN', {month:'long', year:'numeric'});

function addTxn(){
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const cat = document.getElementById('cat').value;
  const date = document.getElementById('date').value || today();
  if(!desc || !amount || amount <= 0){ alert('Please enter a description and a valid amount.'); return; }
  txns.unshift({id: nextId++, desc, amount, cat, date});
  save();
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').value = today();
  render();
}

function deleteTxn(id){
  if(!confirm('Delete this transaction?')) return;
  txns = txns.filter(t => t.id !== id);
  save(); render();
}

function setTab(tab, el){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const totalIncome  = txns.filter(t=> isIncome(t.cat)).reduce((s,t)=>s+t.amount,0);
  const totalExpense = txns.filter(t=>!isIncome(t.cat)).reduce((s,t)=>s+t.amount,0);
  const balance = totalIncome - totalExpense;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Income</div><div class="metric-val green">${fmt(totalIncome)}</div></div>
    <div class="metric"><div class="metric-label">Expenses</div><div class="metric-val red">${fmt(totalExpense)}</div></div>
    <div class="metric metric-full"><div class="metric-label">Balance</div><div class="metric-val ${balance>=0?'green':'red'}">${fmt(Math.abs(balance))}${balance<0?' (deficit)':''}</div></div>
  `;

  const filtered = activeTab === 'all' ? txns
    : activeTab === 'expense' ? txns.filter(t=>!isIncome(t.cat))
    : txns.filter(t=> isIncome(t.cat));

  const list = document.getElementById('txnList');
  if(!filtered.length){
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No transactions here yet.</div>`;
  } else {
    list.innerHTML = `<div class="txn-list">${filtered.map(t => {
      const inc = isIncome(t.cat);
      const icon = inc ? '↓' : '↑';
      return `<div class="txn">
        <div class="txn-icon ${inc?'inc':'exp'}">${icon}</div>
        <div class="txn-info">
          <div class="txn-name">${t.desc}</div>
          <div class="txn-meta">${t.cat}</div>
        </div>
        <div class="txn-right">
          <div class="txn-amount ${inc?'green':'red'}">${inc?'+':'-'}${fmt(t.amount)}</div>
          <div class="txn-date">${t.date}</div>
        </div>
        <button class="del-btn" onclick="deleteTxn(${t.id})" title="Delete">×</button>
      </div>`;
    }).join('')}</div>`;
  }

  const expTxns = txns.filter(t=>!isIncome(t.cat));
  const catMap = {};
  expTxns.forEach(t=>{ catMap[t.cat] = (catMap[t.cat]||0)+t.amount; });
  const cats = Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const max = cats.length ? Math.max(...cats.map(c=>catMap[c])) : 1;

  document.getElementById('barChart').innerHTML = cats.length
    ? cats.map(c => `
        <div class="bar-row">
          <div class="bar-label">${c}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(catMap[c]/max*100)}%;background:${CAT_COLORS[c]||'#888'}"></div></div>
          <div class="bar-val">${fmt(catMap[c])}</div>
        </div>`)
      .join('')
    : '<div style="font-size:13px;color:var(--text2);text-align:center;padding:1rem">No expenses to show yet.</div>';
}

render();
</script>
</body>
</html>
